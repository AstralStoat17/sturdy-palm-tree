name: Build Android 

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: alvrme/alpine-android:android-34-jdk21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Build Nightly Release APK
        run: assembleNightlyDebug

      - name: Upload Nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: gitnex-nightly
          path: app/build/outputs/apk/nightly/debug/*.apk
